name: Publish Maven repository to GitHub Pages

# Builds the library and publishes it as a static Maven repository
# served via GitHub Pages, so it can be used as an additional
# maven/gradle repository in downstream projects.
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to local repo directory
        run: ./gradlew publish

      - name: Deploy static maven repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/repo
          destination_dir: .
          keep_files: true
